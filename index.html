<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Tracker Login</title>
<!-- tailwind + daisyui -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- goggle font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-xl rounded-xl p-10 w-[400px] text-center">

<div class="flex justify-center mb-4">
<div class="w-[100px] h-[97px] bg-1F2937 text-white flex items-center justify-center rounded-full font-bold"><img src="./assets/github-logo.png" alt="">
</div>
</div>

<h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
<p class="text-gray-500 mb-6">Sign in to manage your issues</p>

<fieldset class="fieldset  rounded-box w-xs">

  <label class="label font-bold text-sm  ">Username</label>
  <input id="Username" type="Username" class="input" placeholder="Enter Username" />

  <label class="label font-bold text-sm">Password</label>
  <input id="password" type="password" class="input" placeholder="Enter Password" />

  <button class="btn btn-primary mt-4">Sign In </button>
</fieldset>
<h3 class="text-center gap-[24px]  ">OR</h3>

<p class="text-sm text-gray-500 mt-4"> 
Demo Credentials:

<p>Username: admin <br>

</div>

<script src="script.js"></script>

</body>
</html>
