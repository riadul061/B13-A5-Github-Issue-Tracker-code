<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white w-[400px] p-8">

        <div class="flex justify-center mb-4">
            <img class="w-14" src="assets/github-logo.png" alt="">
        </div>
    
    <h2 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h2>
    <p class="text-[#64748B] text-center mb-6">Sign in to manage your issues</p>

    <form action="" id="login-form">

        <label for="" class="font-medium text-sm">Username</label>
        <input id="username" type="text" placeholder="Enter Username" class="w-full border-1 border-[#E4E4E7] p-3 rounded-lg m-1">
        <p class="text-purple-600 text-sm mb-4">Default: admin</p>

        <label for="" class="font-medium text-sm">Password</label>
        <input id="password" type="password" placeholder="Enter Password" class="w-full border-1 border-[#E4E4E7] p-3 rounded-lg m-1">
        <p class="text-purple-600 text-sm mb-4">Default: admin123</p>

        <button type="submit" class="w-full bg-[#4A00ff] text-white p-3 font-semibold rounded-lg  hover:opacity-90 transition">Sign In</button>

    </form>

    <div class="flex items-center my-6">
        <div class="flex-grow  text-gray-300 border-t"></div>
        <span class="mx-3">OR</span>
        <div class="flex-grow  text-gray-300 border-t"></div>
    </div>

    <footer>
        <p class="text-center text-gray-500 text-sm mb-2">Demo Credentials:</p>
        <div class="bg-gray-100 rounded-lg p-4 text-center">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
    </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
